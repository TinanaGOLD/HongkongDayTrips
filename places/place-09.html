      <section class="section">
        <h2>Transport</h2>
        <p>港铁：坚尼地城站→中环站（港岛线，15 分钟），步行至中环天星码头</p>
<p>或叮叮车：坚尼地城→中环毕打街（25 分钟），步行至码头</p>
      </section>

      <section class="section">
        <h2>Photo tips</h2>
        <p>在船上用窗框构图，或在码头栏杆边拍人像剪影</p>
      </section>

      <section class="section">
        <h2>Nearby food</h2>
        <p>富豪雪糕车（尖沙咀码头）：软雪糕（李现吃过）</p>
