<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>1. 中环 - 文武庙 | Hong Kong Day Trip</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <a class="back" href="../index.html">&lt;- Back</a>
        <h1>1. 中环 - 文武庙</h1>
      </header>

      <section class="section">
        <h2>Transport</h2>
        <p>香港西九龙站（高铁）</p>
<p>通关：一地两检，出站后步行约 2 分钟到柯士甸站（屯马线）</p>
<p>乘车：柯士甸站 → 红磡 → 换乘荃湾线 → 中环站（约 15 分钟）</p>
<p>出站：中环站 D1 出口，步行到文武庙</p>
      </section>

      <section class="section">
        <h2>Photo tips</h2>
        <p>利用逆光拍摄香炉烟雾，配合昏暗室内光线，营造电影氛围感</p>
      </section>

      <section class="section">
        <h2>Nearby food</h2>
        <p>halfway咖啡（李现吃过）</p>
      </section>

      
      <section class="section">
  <h2>Reference photos</h2>
  <div class="img-grid">
    <figure class="img-item"><img loading="lazy" src="../assets/images/1-2-1文武庙.png" alt="1-2-1文武庙" /><figcaption>1-2-1文武庙</figcaption></figure>
<figure class="img-item"><img loading="lazy" src="../assets/images/1-2-2文武庙.png" alt="1-2-2文武庙" /><figcaption>1-2-2文武庙</figcaption></figure>
<figure class="img-item"><img loading="lazy" src="../assets/images/1-2-3文武庙.png" alt="1-2-3文武庙" /><figcaption>1-2-3文武庙</figcaption></figure>
  </div>
</section>

      <div class="next-nav">
        <a href="place-02.html" class="next-btn">下一站 →</a>
      </div>

      <div class="notes-section">
        <div class="notes-label">备注（自动保存）</div>
        <textarea class="notes-textarea" id="notes" placeholder="在这里输入备注..."></textarea>
      </div>
    </main>
    <div id="imageModal" class="modal">
      <span class="modal-close">&times;</span>
      <div class="modal-content">
        <img id="modalImage" class="modal-image" src="" alt="Enlarged image" />
      </div>
    </div>

    <script>
      const imageModal = document.getElementById('imageModal');
      const modalImage = document.getElementById('modalImage');
      const modalClose = document.querySelector('.modal-close');

      document.querySelectorAll('.img-item img').forEach(function(img) {
        img.classList.add('clickable-img');
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function() {
          modalImage.src = this.src;
          imageModal.classList.add('show');
          document.body.style.overflow = 'hidden';
        });
      });

      modalClose.addEventListener('click', function() {
        imageModal.classList.remove('show');
        document.body.style.overflow = 'auto';
      });

      imageModal.addEventListener('click', function(e) {
        if (e.target === this) {
          imageModal.classList.remove('show');
          document.body.style.overflow = 'auto';
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          imageModal.classList.remove('show');
          document.body.style.overflow = 'auto';
        }
      });

      // Notes functionality with localStorage
      const notesTextarea = document.getElementById('notes');
      const storageKey = 'hk-trip-notes-place-01';

      // Load saved notes
      const savedNotes = localStorage.getItem(storageKey);
      if (savedNotes) {
        notesTextarea.value = savedNotes;
      }

      // Save notes on input
      notesTextarea.addEventListener('input', function() {
        localStorage.setItem(storageKey, this.value);
      });
    </script>
  </body>
</html>
