      <section class="section">
        <h2>Transport</h2>
        <p>香港西九龙站（高铁）</p>
<p>通关：一地两检，出站后步行约 2 分钟到柯士甸站（屯马线）</p>
<p>乘车：柯士甸站 → 红磡 → 换乘荃湾线 → 中环站（约 15 分钟）</p>
<p>出站：中环站 D1 出口，步行到文武庙</p>
      </section>

      <section class="section">
        <h2>Photo tips</h2>
        <p>利用逆光拍摄香炉烟雾，配合昏暗室内光线，营造电影氛围感</p>
      </section>
