      <section class="section">
        <h2>Transport</h2>
        <p>从石板街步行约5分钟</p>
<p>中环站J2口：出站右转穿过遮打花园，上旋转天桥/导航 长江集团中心上旁边天桥</p>
      </section>

      <section class="section">
        <h2>Photo tips</h2>
        <p>红砖墙和螺旋楼梯是标志性机位，适合拍出纵深感照片</p>
      </section>

      <section class="section">
        <h2>Nearby food</h2>
        <p>添好运（香港站）：李现同款酥皮叉烧包</p>
<p>九记牛腩（上环）：清汤牛腩伊面</p>
<p>胜香园（九记对面）：番茄牛肉通粉</p>
      </section>
