<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10. 尖沙咀 - Shake Shack | Hong Kong Day Trip</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <a class="back" href="../index.html">&lt;- Back</a>
        <h1>10. 尖沙咀 - Shake Shack</h1>
      </header>

      <section class="section">
        <h2>Transport</h2>
        <p>从尖沙咀码头步行至海港城海运大厦地下，约5分钟</p>
      </section>

      <section class="section">
        <h2>Photo tips</h2>
        <p>1、在海景露台一边吃汉堡一边拍维港</p>
<p>2、尖沙咀海港城3楼泡泡玛特，免费拍人生四格</p>
      </section>

      <section class="section">
        <h2>Nearby food</h2>
        <p>旺记冰室：滑蛋虾仁饭</p>
<p>华嫂冰室：招牌菠萝包</p>
<p>Shake Shack：招牌芝士牛肉汉堡、波浪薯条、奶昔（李现吃过）</p>
      </section>

      
      <section class="section">
  <h2>Reference photos</h2>
  <div class="img-grid">
    <figure class="img-item"><img loading="lazy" src="../assets/images/10-2-1码头.png" alt="10-2-1码头" /><figcaption>10-2-1码头</figcaption></figure>
  </div>
</section>
      <div class="next-nav">
        <a href="place-09.html" class="next-btn">← 上一站</a>
        <a href="place-11.html" class="next-btn">下一站 →</a>
      </div>

      <div class="notes-section">
        <div class="notes-label">备注（自动保存）</div>
        <textarea class="notes-textarea" id="notes" placeholder="在这里输入备注..."></textarea>
      </div>
    </main>
    <div id="imageModal" class="modal">
      <span class="modal-close">&times;</span>
      <div class="modal-content">
        <img id="modalImage" class="modal-image" src="" alt="Enlarged image" />
      </div>
    </div>

    <script>
      const imageModal = document.getElementById('imageModal');
      const modalImage = document.getElementById('modalImage');
      const modalClose = document.querySelector('.modal-close');

      document.querySelectorAll('.img-item img').forEach(function(img) {
        img.classList.add('clickable-img');
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function() {
          modalImage.src = this.src;
          imageModal.classList.add('show');
          document.body.style.overflow = 'hidden';
        });
      });

      modalClose.addEventListener('click', function() {
        imageModal.classList.remove('show');
        document.body.style.overflow = 'auto';
      });

      imageModal.addEventListener('click', function(e) {
        if (e.target === this) {
          imageModal.classList.remove('show');
          document.body.style.overflow = 'auto';
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          imageModal.classList.remove('show');
          document.body.style.overflow = 'auto';
        }
      });
      // Notes functionality with localStorage
      const notesTextarea = document.getElementById('notes');
      const storageKey = 'hk-trip-notes-place-10';

      const savedNotes = localStorage.getItem(storageKey);
      if (savedNotes) {
        notesTextarea.value = savedNotes;
      }

      notesTextarea.addEventListener('input', function() {
        localStorage.setItem(storageKey, this.value);
      });
    </script>
  </body>
</html>
